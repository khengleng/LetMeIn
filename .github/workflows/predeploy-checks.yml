name: Predeploy Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm install
      - run: npm run build

  bot-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bot/package-lock.json
      - run: npm install
      - run: node --check health.js
      - run: node --check handlers.js

  cron-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cron/package-lock.json
      - run: npm install
      - run: node --check index.js
